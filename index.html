<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container">
      <input type="text" id="display" readonly />
      <div id="calculator-buttons">
        <button onclick="ToDisplay('+')" class="operator">+</button>
        <button onclick="ToDisplay('1')" class="btn">1</button>
        <button onclick="ToDisplay('2')" class="btn">2</button>
        <button onclick="ToDisplay('3')" class="btn">3</button>
        <button onclick="ToDisplay('-')" class="operator">-</button>
        <button onclick="ToDisplay('4')" class="btn">4</button>
        <button onclick="ToDisplay('5')" class="btn">5</button>
        <button onclick="ToDisplay('6')" class="btn">6</button>
        <button onclick="ToDisplay('*')" class="operator">x</button>
        <button onclick="ToDisplay('7')" class="btn">7</button>
        <button onclick="ToDisplay('8')" class="btn">8</button>
        <button onclick="ToDisplay('9')" class="btn">9</button>
        <button onclick="ToDisplay('/')" class="operator">&#247;</button>
        <button onclick="ToDisplay('0')" class="btn">0</button>
        <button onclick="ToDisplay('.')" class="btn">.</button>
        <button onclick="Calculate()" class="btn">=</button>
        <button onclick="ToClear()" class="operator">C</button>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
